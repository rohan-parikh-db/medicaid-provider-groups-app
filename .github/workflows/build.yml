name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript type check
        run: npm run typecheck || npx tsc -b --noEmit

      - name: Build server + client
        # App.yaml env vars are validated at runtime (imported by server/server.ts
        # at startup), so we stub them for a pure build-check.
        env:
          DATABRICKS_WAREHOUSE_ID: stub
          APP_CATALOG: stub
          APP_SCHEMA: stub
          APP_TABLE: stub
        run: npm run build
